<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sub2API Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
        }
        h1 { font-size: 2.5em; color: #00ff88; margin-bottom: 10px; }
        .subtitle { color: #888; font-size: 1.1em; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #333;
            transition: border-color 0.3s;
        }
        .card:hover { border-color: #00ff88; }
        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 1.2em;
            font-weight: 600;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        .status-online { background: #00ff88; }
        .status-offline { background: #ff4444; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #333;
        }
        .stat-row:last-child { border-bottom: none; }
        .stat-label { color: #888; }
        .stat-value { color: #fff; font-weight: 600; }
        .model-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }
        .model-tag {
            background: #252525;
            color: #00ff88;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            border: 1px solid #333;
        }
        .chat-test {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #333;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            color: #888;
            margin-bottom: 8px;
            font-size: 0.9em;
        }
        input, textarea, select {
            width: 100%;
            background: #252525;
            border: 1px solid #444;
            color: #e0e0e0;
            padding: 12px;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #00ff88;
        }
        textarea { min-height: 100px; resize: vertical; }
        button {
            background: #00ff88;
            color: #0f0f0f;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        button:hover { opacity: 0.8; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .response-area {
            margin-top: 20px;
            padding: 15px;
            background: #252525;
            border-radius: 8px;
            min-height: 100px;
            white-space: pre-wrap;
            word-break: break-word;
            display: none;
        }
        .response-area.active { display: block; }
        .error { color: #ff4444; }
        .success { color: #00ff88; }
        .loading { color: #888; }
        .endpoint {
            background: #252525;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            margin-top: 15px;
            word-break: break-all;
        }
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            margin-left: 10px;
        }
        .badge-success { background: #00ff8833; color: #00ff88; }
        .badge-error { background: #ff444433; color: #ff4444; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ Sub2API Dashboard</h1>
            <p class="subtitle">ChatGPT Web Token API 代理服务</p>
        </header>

        <div class="grid">
            <div class="card">
                <div class="card-header">
                    <span class="status-dot status-online" id="health-dot"></span>
                    服务状态
                </div>
                <div class="stat-row">
                    <span class="stat-label">状态</span>
                    <span class="stat-value" id="health-status">检测中...</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">账号总数</span>
                    <span class="stat-value" id="account-total">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">健康账号</span>
                    <span class="stat-value" id="account-healthy">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">端口</span>
                    <span class="stat-value">16731</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">API Key</span>
                    <span class="stat-value">maple3474468992</span>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    🚀 快速测试
                </div>
                <div class="endpoint">
POST http://localhost:16731/v1/chat/completions
Authorization: Bearer maple3474468992
                </div>
                <div style="margin-top: 15px;">
                    <button onclick="testHealth()">检测服务</button>
                    <span id="test-result"></span>
                </div>
            </div>
        </div>

        <div class="card" style="margin-bottom: 20px;">
            <div class="card-header">
                🤖 可用模型
            </div>
            <div class="model-list" id="model-list">
                <span style="color: #888;">加载中...</span>
            </div>
        </div>

        <div class="chat-test">
            <div class="card-header">
                💬 API 测试
            </div>
            <div class="grid" style="margin-bottom: 0;">
                <div>
                    <div class="input-group">
                        <label>模型</label>
                        <select id="model-select">
                            <option value="gpt-5.5">gpt-5.5</option>
                            <option value="gpt-5.4">gpt-5.4</option>
                            <option value="gpt-5.4-mini">gpt-5.4-mini</option>
                            <option value="gpt-5.3-codex">gpt-5.3-codex</option>
                            <option value="gpt-5.2">gpt-5.2</option>
                            <option value="gpt-5.1-codex">gpt-5.1-codex</option>
                            <option value="o1">o1</option>
                            <option value="o3">o3</option>
                            <option value="claude-sonnet-4">claude-sonnet-4</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>API Key</label>
                        <input type="text" id="api-key" value="maple3474468992" placeholder="输入 API Key">
                    </div>
                </div>
                <div>
                    <div class="input-group">
                        <label>消息内容</label>
                        <textarea id="message" placeholder="输入测试消息，例如：你好，请介绍一下自己">你好，请简单介绍一下自己</textarea>
                    </div>
                    <div class="input-group">
                        <label>
                            <input type="checkbox" id="stream-check" checked> 流式输出
                        </label>
                    </div>
                </div>
            </div>
            <button onclick="sendMessage()" id="send-btn">发送消息</button>
            <div class="response-area" id="response"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:16731';
        
        async function testHealth() {
            const resultEl = document.getElementById('test-result');
            resultEl.innerHTML = '<span class="loading">检测中...</span>';
            
            try {
                const resp = await fetch(`${API_BASE}/health`);
                const data = await resp.json();
                
                if (data.status === 'healthy') {
                    resultEl.innerHTML = '<span class="badge badge-success">正常</span>';
                } else {
                    resultEl.innerHTML = '<span class="badge badge-error">异常</span>';
                }
            } catch (e) {
                resultEl.innerHTML = '<span class="badge badge-error">连接失败</span>';
            }
        }

        async function loadHealth() {
            try {
                const resp = await fetch(`${API_BASE}/health`);
                const data = await resp.json();
                
                document.getElementById('health-status').textContent = data.status === 'healthy' ? '运行中' : '异常';
                document.getElementById('health-status').className = 'stat-value ' + (data.status === 'healthy' ? 'success' : 'error');
                document.getElementById('account-total').textContent = data.accounts.total;
                document.getElementById('account-healthy').textContent = data.accounts.healthy;
                
                const dot = document.getElementById('health-dot');
                dot.className = 'status-dot ' + (data.status === 'healthy' ? 'status-online' : 'status-offline');
            } catch (e) {
                document.getElementById('health-status').textContent = '连接失败';
                document.getElementById('health-status').className = 'stat-value error';
                document.getElementById('health-dot').className = 'status-dot status-offline';
            }
        }

        async function loadModels() {
            try {
                const resp = await fetch(`${API_BASE}/v1/models`, {
                    headers: { 'Authorization': 'Bearer maple3474468992' }
                });
                const data = await resp.json();
                
                const listEl = document.getElementById('model-list');
                listEl.innerHTML = data.data.map(m => 
                    `<span class="model-tag" title="${m.owned_by}">${m.id}</span>`
                ).join('');
            } catch (e) {
                document.getElementById('model-list').innerHTML = '<span style="color: #ff4444;">加载失败</span>';
            }
        }

        async function sendMessage() {
            const btn = document.getElementById('send-btn');
            const responseEl = document.getElementById('response');
            const model = document.getElementById('model-select').value;
            const apiKey = document.getElementById('api-key').value;
            const message = document.getElementById('message').value;
            const stream = document.getElementById('stream-check').checked;
            
            if (!message.trim()) {
                alert('请输入消息内容');
                return;
            }
            
            btn.disabled = true;
            responseEl.classList.add('active');
            responseEl.innerHTML = '<span class="loading">请求中...</span>';
            
            try {
                const resp = await fetch(`${API_BASE}/v1/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: [{ role: 'user', content: message }],
                        stream: stream
                    })
                });
                
                if (stream) {
                    const reader = resp.body.getReader();
                    const decoder = new TextDecoder();
                    let content = '';
                    
                    responseEl.innerHTML = '';
                    
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        
                        const chunk = decoder.decode(value);
                        const lines = chunk.split('\n');
                        
                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                const data = line.slice(6);
                                if (data === '[DONE]') continue;
                                
                                try {
                                    const parsed = JSON.parse(data);
                                    if (parsed.choices && parsed.choices[0].delta) {
                                        content += parsed.choices[0].delta.content || '';
                                    }
                                } catch (e) {}
                            }
                        }
                        
                        responseEl.textContent = content || '等待响应...';
                    }
                    
                    responseEl.innerHTML = '<span class="success">✓ </span>' + content;
                } else {
                    const data = await resp.json();
                    const content = data.choices?.[0]?.message?.content || '无响应';
                    responseEl.innerHTML = '<span class="success">✓ </span>' + content;
                }
            } catch (e) {
                responseEl.innerHTML = '<span class="error">✗ 错误: ' + e.message + '</span>';
            } finally {
                btn.disabled = false;
            }
        }

        // 初始化
        loadHealth();
        loadModels();
        
        // 每30秒刷新状态
        setInterval(loadHealth, 30000);
    </script>
</body>
</html>
